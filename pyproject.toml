[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "coderAI"
version = "0.2.0"
description = "Intelligent coding agent CLI with a React-powered terminal UI (Ink) and MCP tools"
readme = "README.md"
requires-python = ">=3.9"
authors = [
    {name = "CoderAI", email = "hello@coderai.dev"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "rich>=13.7.0",
    "click>=8.1.7",
    "openai>=1.10.0",
    "requests>=2.31.0",
    "pydantic>=2.5.0",
    "aiohttp>=3.9.0",
    "tiktoken>=0.5.2",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0",
    "groq>=0.4.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/coderAI/coderAI"
Releases = "https://github.com/coderAI/coderAI/releases"
Issues = "https://github.com/coderAI/coderAI/issues"
Source = "https://github.com/coderAI/coderAI"

[project.scripts]
coderAI = "coderAI.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["coderAI*"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py39"


name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # Windows is best-effort / non-blocking (matrix.experimental). Primary
    # support is POSIX (Linux + macOS). See SECURITY.md "Supported platforms".
    # Promote to blocking (drop experimental) once the Windows runner is green.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"
            experimental: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff Format
        run: python -m ruff format --check coderAI/

      - name: Ruff Lint
        run: python -m ruff check coderAI/

      - name: Mypy
        run: python -m mypy coderAI/

      - name: Pytest
        run: pytest -q --cov=coderAI --cov-fail-under=70

      - name: CLI smoke test
        run: coderAI --version

  security:
    name: Security regression suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Blocking: the red-team regression corpus (blocklist bypass, exec sandbox,
      # workspace trust, provenance/egress, SSRF/redirect, delegation, MCP/OAuth
      # trust, FS hygiene, download hardening) must stay green. Kept separate from
      # the coverage-gated suite so a security regression is unambiguous in CI.
      - name: Security tests
        run: pytest -m security -q

      # Advisory (non-blocking): pip-audit has no severity filter, so a fresh
      # transitive CVE must not block unrelated PRs. Dependabot opens update
      # PRs; triage failures here before promoting this step to blocking.
      - name: Dependency audit (pip-audit)
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.lock --desc --strict

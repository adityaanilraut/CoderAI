name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # The Windows entry is non-blocking for now (matrix.experimental). It runs
    # despite a POSIX-oriented codebase (there was a Windows-compat pass — see
    # tests/test_windows_compat.py) but hasn't been proven green on a real
    # runner yet. Promote it to blocking (drop experimental) once it passes.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"
            experimental: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff Format
        run: python -m ruff format --check coderAI/

      - name: Ruff Lint
        run: python -m ruff check coderAI/

      - name: Mypy
        run: python -m mypy coderAI/

      - name: Pytest
        run: pytest -q --cov=coderAI --cov-fail-under=65

      - name: CLI smoke test
        run: coderAI --version

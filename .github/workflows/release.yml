name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel + sdist
        run: python -m build

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Git tags are v0.3.0; PyPI versions are 0.3.0 (no leading v).
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            Python wheel and sdist. Install with:
            ```bash
            pip install coderai-agent==${{ steps.tag.outputs.version }}
            ```
            Run interactive chat:
            ```bash
            coderAI chat
            ```

  publish-pypi:
    name: Publish to PyPI
    needs: publish-github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
